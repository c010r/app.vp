server {
    listen 80;
    server_name app.patioviejo.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.patioviejo.fun;

    # Certbot completara estos paths automaticamente
    ssl_certificate     /etc/letsencrypt/live/app.patioviejo.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.patioviejo.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/app-vp/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/app-vp/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }
}
