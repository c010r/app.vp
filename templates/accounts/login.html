{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — App VP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark">
<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-lg" style="width: 400px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-gem fs-1 text-primary"></i>
        <h2 class="fw-bold mt-2">App VP</h2>
        <p class="text-muted">Ingresá tu usuario y contraseña</p>
      </div>

      {% if form.errors %}
      <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          {{ form.username }}
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="{% url 'tickets:public_list' %}" class="text-decoration-none text-muted small">
          <i class="bi bi-ticket"></i> Ver eventos y comprar entradas
        </a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
