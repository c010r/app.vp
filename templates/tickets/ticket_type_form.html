{% extends 'base.html' %}
{% block title %}Tipo de Entrada{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">Nuevo Tipo de Entrada — {{ event.name }}</h5>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Crear</button>
            <a href="{% url 'tickets:admin_list' %}" class="btn btn-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
